# Isolated stack for @SpringBootTest (no local PostgreSQL / GCP required).
# Flyway scripts are PostgreSQL-specific; tests use Hibernate ddl-auto on H2 instead.
spring:
  datasource:
    url: jdbc:h2:mem:user_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.dialect: org.hibernate.dialect.H2Dialect
  cloud:
    gcp:
      pubsub:
        enabled: false

user:
  pubsub:
    enabled: false
