server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /
      path-mapping:
        health: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

spring:
  application:
    name: user

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_ISSUER_URI:https://auth.mycompany.com}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    url: jdbc:postgresql://localhost:5432/user
    username: ${DB_USERNAME:user_user}
    password: ${DB_PASSWORD:user_password}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none

  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:dev-project}
      credentials:
        location: ${GCP_CREDENTIALS_PATH:}
      pubsub:
        enabled: ${GCP_PUBSUB_ENABLED:false}

# Pub/Sub subscriber for user events (signup + email verified); enable via env or application-local
user:
  pubsub:
    enabled: ${USER_PUBSUB_ENABLED:false}
    subscription: user-signup-events-sub
