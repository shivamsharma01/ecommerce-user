server:
  port: 8082

spring:
  application:
    name: user

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.mycompany.com

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    url: jdbc:postgresql://localhost:5432/user
    username: ${DB_USERNAME:username_user}
    password: ${DB_PASSWORD:password_user}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none

  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:dev-project}
      credentials:
        location: ${GCP_CREDENTIALS_PATH:}
      pubsub:
        enabled: ${GCP_PUBSUB_ENABLED:false}

# Enable Pub/Sub subscriber when GCP is configured (set user.pubsub.enabled=true in prod)
user:
  pubsub:
    enabled: ${USER_PUBSUB_ENABLED:false}
    subscription: user-signup-events-sub
