server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /
      path-mapping:
        health: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

spring:
  application:
    name: user
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/user}
    username: ${SPRING_DATASOURCE_USERNAME:user_user}
    password: ${SPRING_DATASOURCE_PASSWORD:user_password}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: none
  cloud:
    gcp:
      project-id: ${SPRING_CLOUD_GCP_PROJECT_ID:dev-project}
      credentials:
        location: ${SPRING_CLOUD_GCP_CREDENTIALS_LOCATION:}
      pubsub:
        enabled: ${SPRING_CLOUD_GCP_PUBSUB_ENABLED:false}

user:
  pubsub:
    enabled: ${USER_PUBSUB_ENABLED:false}
    subscription: ${USER_PUBSUB_SUBSCRIPTION:user-signup-events-sub}
