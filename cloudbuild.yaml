# Google Cloud Build — Docker build → Artifact Registry → kubectl set image + rollout.
#
# Image: ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:${COMMIT_SHA|SHORT_SHA|BUILD_ID}
#
# IAM (Cloud Build default SA: PROJECT_NUMBER@cloudbuild.gserviceaccount.com):
#   - roles/artifactregistry.writer
#   - roles/container.developer
#
# Trigger (substitutions are required for your project values):
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_PROJECT_ID=my-proj,_REPO=app,_SERVICE_NAME=user,_GKE_CLUSTER=my-cluster,_GKE_LOCATION=us-central1
#
# Build-only: add _SKIP_DEPLOY=true

timeout: 1200s

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

substitutions:
  _REGION: us-central1
  _PROJECT_ID: your-gcp-project
  _REPO: docker-repo
  _SERVICE_NAME: user
  _GKE_CLUSTER: your-gke-cluster
  _GKE_LOCATION: us-central1
  _SKIP_DEPLOY: "false"

steps:
  # One step owns the image URI (tag + registry path) so push and kubectl stay aligned.
  - id: build-and-push
    name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        TAG="$${COMMIT_SHA:-}"
        if [[ -z "$${TAG}" ]]; then TAG="$${SHORT_SHA:-}"; fi
        if [[ -z "$${TAG}" ]]; then TAG="$${BUILD_ID}"; fi

        REGISTRY_HOST="${_REGION}-docker.pkg.dev"
        IMAGE="$${REGISTRY_HOST}/${_PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:$${TAG}"
        CACHE_IMAGE="$${REGISTRY_HOST}/${_PROJECT_ID}/${_REPO}/${_SERVICE_NAME}:buildcache"

        docker pull "$${CACHE_IMAGE}" || true

        docker build \
          --cache-from "$${CACHE_IMAGE}" \
          -t "$${IMAGE}" \
          -t "$${CACHE_IMAGE}" \
          .

        docker push "$${IMAGE}"
        docker push "$${CACHE_IMAGE}"

        printf '%s' "$${IMAGE}" > /workspace/image_ref

  - id: kubectl-set-image
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if [[ "${_SKIP_DEPLOY}" == "true" ]]; then
          echo "Skipping deploy (_SKIP_DEPLOY=true)"
          exit 0
        fi

        gcloud config set project "${_PROJECT_ID}"
        gcloud container clusters get-credentials "${_GKE_CLUSTER}" \
          --region "${_GKE_LOCATION}" \
          --project "${_PROJECT_ID}"

        IMAGE="$$(cat /workspace/image_ref)"
        kubectl set image "deployment/${_SERVICE_NAME}" "${_SERVICE_NAME}=$${IMAGE}"
        kubectl rollout status "deployment/${_SERVICE_NAME}" --timeout=300s

    waitFor:
      - build-and-push
