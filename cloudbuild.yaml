# Build and push service image to Artifact Registry. Update the image tag in
# ecomm-infra (deploy/k8s/apps/user/deployment.yaml) and run the ecomm-infra
# Cloud Build trigger to roll out, or use kubectl set image from your machine.

substitutions:
  _REGION: asia-south2
  _REPO: docker-apps
  _SERVICE_NAME: user
  _CONFIG_REPO_URL: github.com/shivamsharma01/ecommerce-infra.git

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GITHUB_TOKEN/versions/latest
      env: GITHUB_TOKEN

steps:
  - id: docker-build
    name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - '--progress=plain'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:latest'
      - .

  - id: docker-push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$COMMIT_SHA'

  - id: docker-push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:latest'

  - id: update-config-repo
    name: gcr.io/cloud-builders/git
    entrypoint: bash
    secretEnv:
      - GITHUB_TOKEN
    args:
      - -ceu
      - |
        : "$${GITHUB_TOKEN:?Create Secret Manager secret GITHUB_TOKEN (PAT: repo scope on ecommerce-infra)}"

        RAW_SHA="$${COMMIT_SHA:-$${REVISION_ID:-$${SHORT_SHA:-}}}"
        if [[ -z "$${RAW_SHA}" ]]; then
          RAW_SHA="$$(git rev-parse HEAD 2>/dev/null || true)"
        fi
        : "$${RAW_SHA:?COMMIT_SHA/REVISION_ID missing and git rev-parse failed}"

        IMAGE_URI="$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$${RAW_SHA}"

        git clone "https://oauth2:$${GITHUB_TOKEN}@$_CONFIG_REPO_URL" config-repo
        cd config-repo

        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config user.name "Cloud Build"

        DEPLOY="deploy/k8s/apps/$_SERVICE_NAME/deployment.yaml"
        [[ -f "$${DEPLOY}" ]] || { echo "missing $${DEPLOY}" >&2; exit 1; }

        sed -E "s|^([[:space:]]*image:[[:space:]]*).*docker-apps/$_SERVICE_NAME:[^[:space:]]+|\\1$${IMAGE_URI}|" "$${DEPLOY}" > "$${DEPLOY}.new"
        mv "$${DEPLOY}.new" "$${DEPLOY}"

        if git diff --quiet; then
          echo "No deployment change; skip commit."
          exit 0
        fi

        git add "$${DEPLOY}"
        git commit -m "deploy($_SERVICE_NAME): image $$(printf '%s' "$${RAW_SHA}" | cut -c1-7)"

        for i in $$(seq 1 12); do
          git pull --rebase origin main && git push origin main && exit 0
          echo "git push retry $$i" >&2
          sleep $$((i * 3))
        done
        echo "git push failed after retries" >&2
        exit 1
