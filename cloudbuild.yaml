# Build and push service image to Artifact Registry. Update the image tag in
# ecomm-infra (deploy/k8s/apps/user/deployment.yaml) and run the ecomm-infra
# Cloud Build trigger to roll out, or use kubectl set image from your machine.

substitutions:
  _REGION: asia-south2
  _REPO: docker-apps
  _SERVICE_NAME: user
  _CONFIG_REPO_URL: github.com/shivamsharma01/ecommerce-infra.git
  _CONFIG_REPO_BRANCH: main
  _CONFIG_FILE: deploy/k8s/apps/user/deployment.yaml
  _GITHUB_TOKEN_SECRET: github-token

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/${_GITHUB_TOKEN_SECRET}/versions/latest
      env: GITHUB_TOKEN

steps:
  - id: docker-build
    name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - '--progress=plain'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:latest'
      - .

  - id: docker-push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$COMMIT_SHA'

  - id: docker-push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:latest'

  - id: update-config-repo
    name: gcr.io/cloud-builders/git
    entrypoint: bash
    secretEnv:
      - GITHUB_TOKEN
    args:
      - -ceu
      - |
        : "$${GITHUB_TOKEN:?Set GitHub token via Secret Manager}"

        RAW_SHA="$${COMMIT_SHA:-$${REVISION_ID:-$${SHORT_SHA:-}}}"
        if [[ -z "$${RAW_SHA}" ]]; then
          RAW_SHA="$$(git rev-parse HEAD 2>/dev/null || true)"
        fi
        : "$${RAW_SHA:?COMMIT_SHA/REVISION_ID missing and git rev-parse failed}"

        VERSION="$$(printf '%s' "$${RAW_SHA}" | cut -c1-7)"
        # Use full SHA tag to match docker-push-sha exactly.
        IMAGE_URI="$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE_NAME:$${RAW_SHA}"

        git clone "https://x-access-token:$${GITHUB_TOKEN}@${_CONFIG_REPO_URL}" config-repo
        cd config-repo
        git checkout "$_CONFIG_REPO_BRANCH"

        test -f "$_CONFIG_FILE"

        sed -i -E \
          "s|^([[:space:]]*image:[[:space:]]*).*$|\\1$${IMAGE_URI}|g" \
          "$_CONFIG_FILE"

        if git diff --quiet -- "$_CONFIG_FILE"; then
          echo "No config changes detected in $_CONFIG_FILE; skipping commit."
          exit 0
        fi

        git config user.name "cloud-build-bot"
        git config user.email "cloud-build-bot@${PROJECT_ID}.iam.gserviceaccount.com"
        git add "$_CONFIG_FILE"
        git commit -m "chore(user): update image to $${VERSION}"

        for i in $$(seq 1 12); do
          git pull --rebase origin "$_CONFIG_REPO_BRANCH" && git push origin "HEAD:${_CONFIG_REPO_BRANCH}" && exit 0
          echo "git push retry $$i" >&2
          sleep $$((i * 3))
        done
        echo "git push failed after retries" >&2
        exit 1
