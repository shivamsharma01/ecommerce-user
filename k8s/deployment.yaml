# Kubernetes Deployment for user microservice
# Replace placeholders before apply (or use .github/workflows — CI substitutes them on push to main):
#   <ARTIFACT_REGISTRY_URL>  e.g. gcr.io/my-project or us-docker.pkg.dev/my-project/docker
#   <VERSION>                image tag and label value (e.g. git short SHA from CI)
#
# Health: GET /health/liveness , GET /health/readiness
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  labels:
    app: user
    version: "<VERSION>"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: user
        version: "<VERSION>"
    spec:
      containers:
        - name: user
          image: <ARTIFACT_REGISTRY_URL>/user:<VERSION>
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          envFrom:
            - configMapRef:
                name: user-config
            - secretRef:
                name: user-secrets
                optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-config
  labels:
    app: user
data:
  SERVER_PORT: "8082"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://127.0.0.1:5432/user"
  SPRING_DATASOURCE_USERNAME: "user_user"
  AUTH_ISSUER_URI: "https://auth.example.com"
  GCP_PROJECT_ID: "my-project"
  SPRING_CLOUD_GCP_PROJECT_ID: "my-project"
  SPRING_CLOUD_GCP_PUBSUB_ENABLED: "false"
  USER_PUBSUB_ENABLED: "false"
  USER_PUBSUB_SUBSCRIPTION: "user-signup-events-sub"
---
# Secrets: create with kubectl or use External Secrets Operator
# kubectl create secret generic user-secrets \
#   --from-literal=SPRING_DATASOURCE_PASSWORD=... \
#   --from-literal=SPRING_CLOUD_GCP_CREDENTIALS_LOCATION=file:/var/secrets/gcp/key.json
